name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Extract changelog from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"

          # Try to extract the section for this version from CHANGELOG.md
          # Matches "## [X.Y.Z]" and captures everything until the next "## [" or EOF
          # Try to extract from CHANGELOG.md if it exists
          SECTION=""
          if [ -f CHANGELOG.md ]; then
            SECTION=$(awk -v ver="$VERSION" '
              /^## \[/ {
                if (found) exit
                if (index($0, "[" ver "]")) { found=1; next }
              }
              found { print }
            ' CHANGELOG.md)
          fi

          # Fallback to git log if no CHANGELOG.md or version not found
          if [ -z "$SECTION" ]; then
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              SECTION=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges | head -50)
            else
              SECTION=$(git log --pretty=format:"- %s" --no-merges | head -30)
            fi
          fi

          {
            echo "changelog<<EOF"
            echo "$SECTION"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Hivekeep ${{ steps.changelog.outputs.version }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ---

            ## Installation

            **One-liner (Linux/macOS):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/MarlBurroW/hivekeep/main/install.sh | bash
            ```

            **Docker:**
            ```bash
            docker run -d \
              --name hivekeep \
              -p 3000:3000 \
              -v hivekeep-data:/app/data \
              ghcr.io/MarlBurroW/hivekeep:${{ github.ref_name }}
            ```

            **Manual:**
            ```bash
            git clone https://github.com/MarlBurroW/hivekeep.git
            cd hivekeep && bun install && bun run build && bun run db:migrate
            NODE_ENV=production bun run start
            ```

            Open `http://localhost:3000` — the setup wizard will guide you through the rest.
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            install.sh
