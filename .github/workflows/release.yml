name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-image:
    name: Build & Push Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Type check (gate)
        run: bun run typecheck

      - name: Build (gate)
        run: bun run build

      - name: Compute image name (lowercased)
        id: image
        run: echo "name=${REPO,,}" >> "$GITHUB_OUTPUT"
        env:
          REPO: ${{ github.repository }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-') }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ startsWith(github.ref, 'refs/tags/') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    needs: build-image
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"

          # No CHANGELOG.md in this repo: build the changelog from git history.
          # Find the previous tag (the one before the tag being released).
          PREV_TAG=$(git describe --tags --abbrev=0 "${GITHUB_REF}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            SECTION=$(git log "${PREV_TAG}..${GITHUB_REF}" --pretty=format:"- %s" --no-merges | head -100)
          else
            SECTION=$(git log "${GITHUB_REF}" --pretty=format:"- %s" --no-merges | head -50)
          fi

          {
            echo "changelog<<HIVEKEEP_EOF"
            echo "$SECTION"
            echo "HIVEKEEP_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Hivekeep ${{ steps.changelog.outputs.version }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ---

            ## Installation

            **One-liner (Linux/macOS):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/MarlBurroW/hivekeep/main/install.sh | bash
            ```

            **Docker:**
            ```bash
            docker run -d \
              --name hivekeep \
              -p 3000:3000 \
              -v hivekeep-data:/app/data \
              ghcr.io/marlburrow/hivekeep:latest
            ```

            For all installation methods and an interactive configurator, see the [install guide](https://marlburrow.github.io/hivekeep/install).
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            install.sh
