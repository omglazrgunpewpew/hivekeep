name: Generate Showcase Videos

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: showcase
  cancel-in-progress: true

jobs:
  generate-showcase:
    name: Record showcase videos
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build frontend
        run: bun run build

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      # ── Record dark mode ──
      - name: Record showcase (dark)
        env:
          E2E_DB_PATH: ${{ runner.temp }}/hivekeep-showcase-dark.db
          SHOWCASE_THEME: dark
        run: |
          npx playwright test --config=playwright.showcase.config.js
          mkdir -p showcase-raw
          find test-results -name "*.webm" -exec cp {} showcase-raw/dark.webm \;

      # ── Record light mode (separate DB to avoid port/state conflicts) ──
      - name: Record showcase (light)
        env:
          E2E_DB_PATH: ${{ runner.temp }}/hivekeep-showcase-light.db
          SHOWCASE_THEME: light
        run: |
          rm -rf test-results
          npx playwright test --config=playwright.showcase.config.js
          find test-results -name "*.webm" -exec cp {} showcase-raw/light.webm \;

      # ── Convert WebM → MP4 ──
      - name: Convert videos to MP4
        run: |
          mkdir -p showcase-videos
          ffmpeg -i showcase-raw/dark.webm \
            -c:v libx264 -preset slow -crf 28 \
            -movflags +faststart -vf "fps=30" \
            showcase-videos/preview-dark.mp4
          ffmpeg -i showcase-raw/light.webm \
            -c:v libx264 -preset slow -crf 28 \
            -movflags +faststart -vf "fps=30" \
            showcase-videos/preview-light.mp4
          ls -lh showcase-videos/

      - name: Upload showcase videos as artifact
        uses: actions/upload-artifact@v7
        with:
          name: showcase-videos
          path: showcase-videos/
          retention-days: 30

      # ── Deploy to gh-pages ──
      - name: Deploy showcase videos to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: showcase-videos
          target-folder: showcase
          single-commit: true
          commit-message: 'chore: update showcase videos'
