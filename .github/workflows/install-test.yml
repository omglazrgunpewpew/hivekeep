name: Install Test

on:
  push:
    branches: [main]
    paths-ignore:
      - 'site/**'
      - '*.md'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'site/**'
      - '*.md'
      - 'LICENSE'

concurrency:
  group: install-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-install:
    name: Native Install
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate install.sh syntax
        run: bash -n install.sh

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run database migrations
        env:
          HIVEKEEP_DATA_DIR: ${{ runner.temp }}/hivekeep-data
        run: |
          mkdir -p "$HIVEKEEP_DATA_DIR"
          DB_PATH="$HIVEKEEP_DATA_DIR/hivekeep.db" bun run db:migrate

      - name: Start server
        env:
          PORT: '3333'
          NODE_ENV: production
          HIVEKEEP_DATA_DIR: ${{ runner.temp }}/hivekeep-data
          DB_PATH: ${{ runner.temp }}/hivekeep-data/hivekeep.db
        run: |
          bun src/server/index.ts &
          echo $! > /tmp/hivekeep-server.pid

      - name: Wait for health check
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3333/api/health > /dev/null 2>&1; then
              echo "Server is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Health check failed after 30s"
          exit 1

      - name: Verify health endpoint
        run: |
          RESPONSE=$(curl -sf http://localhost:3333/api/health)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | jq -e '.status == "ok"'

      - name: Verify frontend is served
        run: |
          HTTP_CODE=$(curl -sf -o /dev/null -w '%{http_code}' http://localhost:3333/)
          echo "Frontend HTTP status: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ]

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/hivekeep-server.pid ]; then
            kill "$(cat /tmp/hivekeep-server.pid)" 2>/dev/null || true
          fi

  docker-install:
    name: Docker Install
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: hivekeep:test

      - name: Start container
        run: |
          docker run -d \
            --name hivekeep-test \
            -p 3000:3000 \
            -v "${{ runner.temp }}/hivekeep-docker-data:/app/data" \
            hivekeep:test

      - name: Wait for container to be healthy
        run: |
          for i in $(seq 1 60); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' hivekeep-test 2>/dev/null || echo "starting")
            if [ "$STATUS" = "healthy" ]; then
              echo "Container is healthy after ${i}s"
              exit 0
            fi
            if [ "$STATUS" = "unhealthy" ]; then
              echo "::error::Container is unhealthy"
              docker logs hivekeep-test
              exit 1
            fi
            sleep 1
          done
          echo "::error::Container did not become healthy after 60s"
          docker logs hivekeep-test
          exit 1

      - name: Verify health endpoint
        run: |
          RESPONSE=$(curl -sf http://localhost:3000/api/health)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | jq -e '.status == "ok"'

      - name: Verify frontend is served
        run: |
          HTTP_CODE=$(curl -sf -o /dev/null -w '%{http_code}' http://localhost:3000/)
          echo "Frontend HTTP status: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ]

      - name: Container logs
        if: always()
        run: docker logs hivekeep-test 2>&1 || true

      - name: Cleanup
        if: always()
        run: |
          docker stop hivekeep-test 2>/dev/null || true
          docker rm hivekeep-test 2>/dev/null || true
