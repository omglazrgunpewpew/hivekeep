name: Deploy Sites

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - 'docs-site/**'
  schedule:
    # Daily, refresh stars/version on the live site.
    - cron: '17 6 * * *'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy sites
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-site-${{ runner.os }}-${{ hashFiles('site/bun.lock') }}
          restore-keys: |
            bun-site-${{ runner.os }}-

      - name: Cache npm dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-docs-${{ runner.os }}-${{ hashFiles('docs-site/package-lock.json') }}
          restore-keys: |
            npm-docs-${{ runner.os }}-

      - name: Refresh stars/version stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p site/src/data

          # Fallback version from package.json (strip a leading v if present).
          PKG_VERSION=$(bun --print "require('./package.json').version")

          REPO_JSON=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/MarlBurroW/hivekeep" || echo '')

          RELEASE_JSON=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/MarlBurroW/hivekeep/releases/latest" || echo '')

          STARS=$(printf '%s' "$REPO_JSON" | bun --print "try { JSON.parse(require('fs').readFileSync(0,'utf8')).stargazers_count ?? 0 } catch { 0 }" 2>/dev/null || echo 0)
          [ -z "$STARS" ] && STARS=0

          LATEST_TAG=$(printf '%s' "$RELEASE_JSON" | bun --print "try { JSON.parse(require('fs').readFileSync(0,'utf8')).tag_name ?? '' } catch { '' }" 2>/dev/null || echo '')
          # Strip a leading v; fall back to package.json version.
          VERSION="${LATEST_TAG#v}"
          [ -z "$VERSION" ] && VERSION="$PKG_VERSION"

          FETCHED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          printf '{"stars":%s,"version":"%s","fetchedAt":"%s"}\n' \
            "$STARS" "$VERSION" "$FETCHED_AT" > site/src/data/stats.json

          echo "Wrote site/src/data/stats.json:"
          cat site/src/data/stats.json

      - name: Build landing site
        run: cd site && bun install --frozen-lockfile && bun run build

      - name: Build docs site
        run: cd docs-site && npm ci && npm run build

      - name: Merge outputs
        run: |
          mkdir -p merged
          cp -r site/dist/* merged/
          mkdir -p merged/docs
          cp -r docs-site/dist/* merged/docs/
          touch merged/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: merged
          single-commit: true
          commit-message: 'chore: update sites'
